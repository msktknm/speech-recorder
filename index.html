<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SpeechRec">
  <meta name="theme-color" content="#0a0a0f">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="manifest" href="manifest.json">
  <title>1分スピーチ録音</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;800&display=swap');
    :root {
      --bg:#0a0a0f; --surface:#12121a; --surface2:#1a1a26;
      --border:rgba(255,255,255,0.08); --border2:rgba(255,255,255,0.18);
      --text:#f0f0f8; --muted:rgba(240,240,248,0.45);
      --accent:#6c63ff; --accent2:#a78bfa;
      --red:#ff4d6d; --green:#4ade80; --amber:#fbbf24;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Syne',system-ui,sans-serif;overflow:hidden}
    #app{height:100%;height:100dvh;display:flex;flex-direction:column;padding:env(safe-area-inset-top,44px) 0 env(safe-area-inset-bottom,20px);overflow:hidden}
    .header{padding:14px 20px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
    .logo{font-size:17px;font-weight:800;letter-spacing:-0.5px;background:linear-gradient(135deg,var(--accent2),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .lang-switch{display:flex;gap:6px}
    .lang-btn{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Syne',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s}
    .lang-btn.active{background:var(--accent);border-color:var(--accent);color:white}
    .api-setup{margin:0 16px 10px;background:var(--surface);border:1px solid var(--border2);border-radius:14px;padding:12px 14px;flex-shrink:0}
    .api-setup-title{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
    .api-row{display:flex;gap:8px;align-items:center}
    .api-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:8px 12px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;outline:none;min-width:0;transition:border-color 0.2s}
    .api-input:focus{border-color:var(--accent)}
    .api-input::placeholder{color:var(--muted)}
    .api-save-btn{padding:8px 14px;background:var(--accent);border:none;border-radius:10px;color:white;font-family:'Syne',sans-serif;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:opacity 0.2s}
    .api-save-btn:active{opacity:.75}
    .api-status{font-size:11px;margin-top:6px;min-height:14px}
    .api-status.ok{color:var(--green)}.api-status.err{color:var(--red)}
    .main{flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding:4px 20px 8px;gap:12px}
    .timer-wrap{position:relative;width:160px;height:160px}
    .timer-svg{transform:rotate(-90deg)}
    .ring-bg{fill:none;stroke:var(--surface2);stroke-width:6}
    .ring-progress{fill:none;stroke:var(--accent);stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset 1s linear,stroke 0.3s}
    .timer-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
    .timer-label{font-family:'DM Mono',monospace;font-size:36px;font-weight:500;letter-spacing:-2px;line-height:1}
    .timer-sub{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
    .waveform{width:100%;max-width:300px;height:38px;display:flex;align-items:center;justify-content:center;gap:3px}
    .wave-bar{width:3px;border-radius:2px;background:var(--accent2);height:4px;transition:height 0.08s ease}
    .rec-btn-wrap{position:relative}
    .rec-btn-ring{position:absolute;inset:-10px;border-radius:50%;border:2px solid transparent;transition:all 0.3s}
    .rec-btn-wrap.recording .rec-btn-ring{border-color:rgba(255,77,109,0.4);animation:ringPulse 1.5s ease-in-out infinite}
    @keyframes ringPulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.1);opacity:0.4}}
    .rec-btn{width:72px;height:72px;border-radius:50%;border:none;background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;box-shadow:0 0 0 1px var(--border),0 8px 28px rgba(0,0,0,0.4)}
    .rec-btn:active{transform:scale(0.92)}.rec-btn.recording{background:var(--red)}
    .rec-icon{width:24px;height:24px;border-radius:50%;background:var(--red);transition:all 0.2s}
    .rec-btn.recording .rec-icon{background:white;border-radius:5px;width:18px;height:18px}
    .status-text{font-size:12px;color:var(--muted);text-align:center;min-height:16px}
    .player-wrap{width:calc(100% - 32px);margin:0 16px 6px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:12px 14px;display:none;flex-direction:column;gap:10px;flex-shrink:0}
    .player-wrap.show{display:flex}
    .player-header{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
    .player-controls{display:flex;align-items:center;gap:10px}
    .play-btn{width:34px;height:34px;border-radius:50%;border:none;background:var(--accent);color:white;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity 0.2s}
    .play-btn:active{opacity:.7}
    .progress-wrap{flex:1;display:flex;flex-direction:column;gap:4px}
    .progress-bar{width:100%;height:4px;background:var(--surface2);border-radius:2px;cursor:pointer;position:relative;overflow:hidden}
    .progress-fill{height:100%;background:var(--accent);border-radius:2px;width:0%;transition:width 0.1s linear;pointer-events:none}
    .progress-times{display:flex;justify-content:space-between;font-family:'DM Mono',monospace;font-size:10px;color:var(--muted)}
    .transcript-panel{flex:1;margin:0 16px 4px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:12px 14px;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;flex-direction:column;gap:8px;min-height:0}
    .transcript-panel.show{display:flex}
    .transcript-header{display:flex;align-items:center;justify-content:space-between;padding-bottom:8px;border-bottom:1px solid var(--border);flex-shrink:0}
    .transcript-title{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
    .copy-btn{padding:4px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--accent2);font-family:'Syne',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:all 0.2s}
    .copy-btn:active{opacity:.6}
    .transcript-text{font-size:15px;line-height:1.75;color:var(--text);white-space:pre-wrap;word-break:break-word;overflow-y:auto}
    .transcript-placeholder{font-size:13px;color:var(--muted);text-align:center;padding:12px 0}
    .processing-indicator{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--accent2)}
    .processing-dot{width:6px;height:6px;border-radius:50%;background:var(--accent2);animation:dotPulse 1s ease-in-out infinite}
    .processing-dot:nth-child(2){animation-delay:.2s}.processing-dot:nth-child(3){animation-delay:.4s}
    @keyframes dotPulse{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:1;transform:scale(1.3)}}
    .bottom-controls{padding:4px 16px 2px;flex-shrink:0}
    .reset-btn{width:100%;padding:12px;background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--muted);font-family:'Syne',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;display:none}
    .reset-btn.show{display:block}.reset-btn:active{opacity:.6}
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="logo">SpeechRec</div>
    <div class="lang-switch">
      <button class="lang-btn active" onclick="setLang('zh')">中文</button>
      <button class="lang-btn" onclick="setLang('en')">EN</button>
    </div>
  </div>

  <div class="api-setup">
    <div class="api-setup-title">Anthropic API Key</div>
    <div class="api-row">
      <input class="api-input" id="apiKeyInput" type="password" placeholder="sk-ant-..." autocomplete="off" autocorrect="off" spellcheck="false">
      <button class="api-save-btn" onclick="saveApiKey()">保存</button>
    </div>
    <div class="api-status" id="apiStatus"></div>
  </div>

  <div class="main">
    <div class="timer-wrap">
      <svg class="timer-svg" width="160" height="160" viewBox="0 0 160 160">
        <circle class="ring-bg" cx="80" cy="80" r="67"/>
        <circle class="ring-progress" id="ring" cx="80" cy="80" r="67"/>
      </svg>
      <div class="timer-inner">
        <div class="timer-label" id="timer">1:00</div>
        <div class="timer-sub" id="timerSub">準備完了</div>
      </div>
    </div>
    <div class="waveform" id="waveform"></div>
    <div class="rec-btn-wrap" id="recWrap">
      <div class="rec-btn-ring"></div>
      <button class="rec-btn" id="recBtn" onclick="toggleRecording()">
        <div class="rec-icon"></div>
      </button>
    </div>
    <div class="status-text" id="statusText">タップして録音開始</div>
  </div>

  <div class="player-wrap" id="playerWrap">
    <div class="player-header">録音した音声</div>
    <div class="player-controls">
      <button class="play-btn" id="playBtn" onclick="togglePlay()">▶</button>
      <div class="progress-wrap">
        <div class="progress-bar" id="progressBar" onclick="seekAudio(event)">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-times">
          <span id="currentTime">0:00</span>
          <span id="totalTime">0:00</span>
        </div>
      </div>
    </div>
  </div>

  <div class="transcript-panel" id="transcriptPanel">
    <div class="transcript-header">
      <span class="transcript-title">文字起こし</span>
      <button class="copy-btn" id="copyBtn" onclick="copyText()">コピー</button>
    </div>
    <div id="transcriptContent">
      <div class="transcript-placeholder">録音後に文字起こしが表示されます</div>
    </div>
  </div>

  <div class="bottom-controls">
    <button class="reset-btn" id="resetBtn" onclick="resetAll()">リセット</button>
  </div>
</div>

<script>
const DURATION=60;
const R=67;
const circumference=2*Math.PI*R;
let lang='zh',apiKey='',isRecording=false,timerInterval=null,timeLeft=DURATION;
let mediaRecorder=null,audioChunks=[],audioBlob=null,audioUrl=null,audioEl=null;
let audioContext=null,analyser=null,micStream=null,animFrame=null;

const ring=document.getElementById('ring');
ring.style.strokeDasharray=circumference;
ring.style.strokeDashoffset=circumference;

// Waveform bars
const wf=document.getElementById('waveform');
const bars=[];
for(let i=0;i<36;i++){const b=document.createElement('div');b.className='wave-bar';wf.appendChild(b);bars.push(b);}

window.addEventListener('DOMContentLoaded',()=>{
  const s=localStorage.getItem('anthropic_key');
  if(s){apiKey=s;document.getElementById('apiKeyInput').value=s;setStatus('✓ APIキーが設定されています','ok');}
});

function setStatus(msg,cls){const el=document.getElementById('apiStatus');el.textContent=msg;el.className='api-status '+(cls||'');}

function saveApiKey(){
  const v=document.getElementById('apiKeyInput').value.trim();
  if(!v.startsWith('sk-ant-')){setStatus('⚠ "sk-ant-" で始まるキーを入力してください','err');return;}
  apiKey=v;localStorage.setItem('anthropic_key',v);setStatus('✓ 保存しました','ok');
}

function setLang(l){
  lang=l;
  document.querySelectorAll('.lang-btn').forEach((b,i)=>b.classList.toggle('active',(i===0&&l==='zh')||(i===1&&l==='en')));
}

function updateTimer(s){
  const m=Math.floor(s/60),sec=s%60;
  document.getElementById('timer').textContent=`${m}:${sec.toString().padStart(2,'0')}`;
  const p=(DURATION-s)/DURATION;
  ring.style.strokeDashoffset=circumference*(1-p);
  ring.style.stroke=s<=10?'#ff4d6d':'#6c63ff';
}

function updateWave(){
  if(!analyser)return;
  const d=new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(d);
  bars.forEach((b,i)=>{const v=d[Math.floor(i*d.length/bars.length)]||0;b.style.height=Math.max(4,(v/255)*36)+'px';});
  animFrame=requestAnimationFrame(updateWave);
}

async function toggleRecording(){isRecording?stopRecording():await startRecording();}

async function startRecording(){
  if(!apiKey){
    document.getElementById('statusText').textContent='先にAPIキーを入力してください';
    setStatus('⚠ APIキーが必要です','err');return;
  }
  try{micStream=await navigator.mediaDevices.getUserMedia({audio:true});}
  catch(e){document.getElementById('statusText').textContent='マイクのアクセスを許可してください';return;}

  try{
    audioContext=new(window.AudioContext||window.webkitAudioContext)();
    analyser=audioContext.createAnalyser();analyser.fftSize=256;
    audioContext.createMediaStreamSource(micStream).connect(analyser);
    updateWave();
  }catch(e){}

  // Pick best mime type for iOS Safari (prefers mp4/aac)
  const mimeType=['audio/mp4','audio/aac','audio/webm;codecs=opus','audio/webm','audio/ogg',''].find(m=>!m||MediaRecorder.isTypeSupported(m))||'';
  audioChunks=[];
  try{mediaRecorder=new MediaRecorder(micStream,mimeType?{mimeType}:{});}
  catch(e){mediaRecorder=new MediaRecorder(micStream);}
  mediaRecorder.ondataavailable=e=>{if(e.data.size>0)audioChunks.push(e.data);};
  mediaRecorder.start(200);

  isRecording=true;timeLeft=DURATION;updateTimer(timeLeft);
  document.getElementById('recBtn').classList.add('recording');
  document.getElementById('recWrap').classList.add('recording');
  document.getElementById('timerSub').textContent='録音中';
  document.getElementById('statusText').textContent='タップして停止';
  document.getElementById('transcriptPanel').classList.add('show');
  document.getElementById('playerWrap').classList.remove('show');
  document.getElementById('resetBtn').classList.remove('show');
  document.getElementById('transcriptContent').innerHTML='<div class="transcript-placeholder">録音中...</div>';

  timerInterval=setInterval(()=>{timeLeft--;updateTimer(timeLeft);if(timeLeft<=0)stopRecording(true);},1000);
}

function stopRecording(auto=false){
  if(!isRecording)return;
  isRecording=false;clearInterval(timerInterval);cancelAnimationFrame(animFrame);
  document.getElementById('recBtn').classList.remove('recording');
  document.getElementById('recWrap').classList.remove('recording');
  document.getElementById('timerSub').textContent=auto?'完了':'停止';
  document.getElementById('statusText').textContent='処理中...';
  bars.forEach(b=>b.style.height='4px');
  document.getElementById('transcriptContent').innerHTML=`
    <div class="processing-indicator">
      <div class="processing-dot"></div><div class="processing-dot"></div><div class="processing-dot"></div>
      <span>文字起こし中...</span>
    </div>`;
  if(mediaRecorder&&mediaRecorder.state!=='inactive'){mediaRecorder.onstop=()=>finalizeRecording();mediaRecorder.stop();}
  if(micStream){micStream.getTracks().forEach(t=>t.stop());micStream=null;}
  if(audioContext){audioContext.close();audioContext=null;analyser=null;}
}

async function finalizeRecording(){
  const mimeType=mediaRecorder.mimeType||'audio/webm';
  audioBlob=new Blob(audioChunks,{type:mimeType});
  if(audioUrl)URL.revokeObjectURL(audioUrl);
  audioUrl=URL.createObjectURL(audioBlob);
  setupPlayer(audioUrl);
  await transcribeAudio(audioBlob,mimeType);
  document.getElementById('statusText').textContent='もう一度録音するにはタップ';
  document.getElementById('resetBtn').classList.add('show');
}

function setupPlayer(url){
  if(audioEl){audioEl.pause();}
  audioEl=new Audio(url);
  audioEl.addEventListener('timeupdate',()=>{
    const p=audioEl.duration?(audioEl.currentTime/audioEl.duration)*100:0;
    document.getElementById('progressFill').style.width=p+'%';
    document.getElementById('currentTime').textContent=fmtTime(audioEl.currentTime);
  });
  audioEl.addEventListener('loadedmetadata',()=>{document.getElementById('totalTime').textContent=fmtTime(audioEl.duration);});
  audioEl.addEventListener('ended',()=>{document.getElementById('playBtn').textContent='▶';document.getElementById('progressFill').style.width='0%';document.getElementById('currentTime').textContent='0:00';});
  document.getElementById('playerWrap').classList.add('show');
}

function togglePlay(){
  if(!audioEl)return;
  if(audioEl.paused){audioEl.play();document.getElementById('playBtn').textContent='⏸';}
  else{audioEl.pause();document.getElementById('playBtn').textContent='▶';}
}

function seekAudio(e){
  if(!audioEl||!audioEl.duration)return;
  const bar=document.getElementById('progressBar'),rect=bar.getBoundingClientRect();
  audioEl.currentTime=Math.max(0,Math.min(1,(e.clientX-rect.left)/rect.width))*audioEl.duration;
}

function fmtTime(s){if(!s||isNaN(s))return'0:00';return`${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,'0')}`;}

async function transcribeAudio(blob,mimeType){
  try{
    const base64=await blobToBase64(blob);
    const data64=base64.split(',')[1];
    // Normalize mime for API
    let apiMime=mimeType.split(';')[0];
    if(!['audio/webm','audio/mp4','audio/mpeg','audio/mp3','audio/wav','audio/ogg','audio/flac'].includes(apiMime)){
      apiMime='audio/webm';
    }

    const prompt=lang==='zh'
      ?'この音声を文字起こししてください。中国語（普通話）で話されています。句読点を正確に含めてください。話された内容をそのまま書き起こしてください。'
      :'Please transcribe this audio recording accurately in English with proper punctuation. Write only the transcribed speech.';

    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':apiKey,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model:'claude-opus-4-5',
        max_tokens:2048,
        messages:[{
          role:'user',
          content:[
            {type:'text',text:prompt},
            {type:'document',source:{type:'base64',media_type:apiMime,data:data64}}
          ]
        }]
      })
    });

    if(!resp.ok){
      const err=await resp.json().catch(()=>({}));
      // If document type not supported, try text-only fallback prompt
      if(resp.status===400){
        await transcribeViaBase64Text(data64,apiMime);return;
      }
      throw new Error(err.error?.message||`API error ${resp.status}`);
    }

    const result=await resp.json();
    const text=result.content?.[0]?.text||'（認識結果なし）';
    document.getElementById('transcriptContent').innerHTML=`<div class="transcript-text">${escHtml(text)}</div>`;
  }catch(e){
    console.error(e);
    document.getElementById('transcriptContent').innerHTML=`<div class="transcript-placeholder" style="color:var(--red)">エラー: ${escHtml(e.message)}</div>`;
    document.getElementById('statusText').textContent='エラーが発生しました';
  }
}

// Fallback: send audio as base64 in text prompt
async function transcribeViaBase64Text(data64,mimeType){
  const prompt=lang==='zh'
    ?'以下のbase64エンコードされた音声データ（'+mimeType+'）を文字起こしして、中国語のテキストのみ返してください。'
    :'The following is a base64-encoded audio file ('+mimeType+'). Please transcribe the speech and return only the transcribed text in English.';

  const resp=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({
      model:'claude-opus-4-5',
      max_tokens:2048,
      messages:[{role:'user',content:[
        {type:'text',text:prompt},
        {type:'document',source:{type:'base64',media_type:mimeType,data:data64}}
      ]}]
    })
  });

  if(!resp.ok){
    const e=await resp.json().catch(()=>({}));
    document.getElementById('transcriptContent').innerHTML=`
      <div class="transcript-placeholder" style="color:var(--amber)">
        ⚠ 文字起こしに失敗しました。<br><br>
        <b>原因</b>: ${escHtml(e.error?.message||'不明なエラー')}<br><br>
        APIが音声形式（${mimeType}）に対応していない可能性があります。
      </div>`;
    return;
  }
  const result=await resp.json();
  const text=result.content?.[0]?.text||'（認識結果なし）';
  document.getElementById('transcriptContent').innerHTML=`<div class="transcript-text">${escHtml(text)}</div>`;
}

function blobToBase64(blob){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(blob);});}
function escHtml(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}

function copyText(){
  const el=document.querySelector('.transcript-text');
  if(!el)return;
  const text=el.innerText;
  const btn=document.getElementById('copyBtn');
  if(navigator.clipboard){navigator.clipboard.writeText(text).then(()=>{btn.textContent='✓ 完了';setTimeout(()=>btn.textContent='コピー',1500);});}
  else{const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;opacity:0';document.body.appendChild(ta);ta.focus();ta.select();document.execCommand('copy');document.body.removeChild(ta);btn.textContent='✓ 完了';setTimeout(()=>btn.textContent='コピー',1500);}
}

function resetAll(){
  if(isRecording)stopRecording();
  if(audioEl){audioEl.pause();audioEl=null;}
  if(audioUrl){URL.revokeObjectURL(audioUrl);audioUrl=null;}
  audioBlob=null;audioChunks=[];
  timeLeft=DURATION;updateTimer(DURATION);ring.style.stroke='#6c63ff';
  document.getElementById('timerSub').textContent='準備完了';
  document.getElementById('statusText').textContent='タップして録音開始';
  document.getElementById('transcriptPanel').classList.remove('show');
  document.getElementById('playerWrap').classList.remove('show');
  document.getElementById('resetBtn').classList.remove('show');
  document.getElementById('playBtn').textContent='▶';
  document.getElementById('progressFill').style.width='0%';
  document.getElementById('currentTime').textContent='0:00';
  document.getElementById('totalTime').textContent='0:00';
  bars.forEach(b=>b.style.height='4px');
}
</script>
</body>
