<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>1-Min Chinese Speech</title>
    
    <!-- PWA Meta Tags for iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="1MinSpeech">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/5968/5968204.png">
    
    <!-- Standard PWA Manifest (Data URL) -->
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIjEtTWludXRlIENoaW5lc2UgU3BlZWNoIFRyYWluZXIiLAogICJzaG9ydF9uYW1lIjogIjFNaW5TcGVlY2giLAogICJzdGFydF91cmwiOiAiLiIsCiAgImRpc3BsYXkiOiAic3RhbmRhbG9uZSIsCiAgImJhY2tncm91bmRfY29sb3IiOiAiIzRmNDZlNSIsCiAgInRoZW1lX2NvbG9yIjogIiM0ZjQ2ZTUiLAogICpvaWNvbnMiOiBbewogICAgInNyYyI6ICJodHRwczovL2Nkbi1pY29ucy1wbmcuZmxhdGljb24uY29tLzUxMi8vNTk2OC81OTY4MjA0LnBuZyIsCiAgICAic2l6ZXMiOiAiNTEyeDUxMiIsCiAgICAidHlwZSI6ICJpbWZ3ZS9wbmciCiAgfV0KfQ==">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .recording-pulse {
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }
        * { -webkit-tap-highlight-color: transparent; }
        
        .timer-circle {
            transition: stroke-dashoffset 1s linear;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        body {
            position: fixed;
            width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: none;
            background-color: #f8fafc;
        }
        .scroll-container {
            height: 100vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: env(safe-area-inset-bottom);
        }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900">
    <div class="scroll-container flex flex-col items-center p-4">
        <div class="w-full max-w-md bg-white rounded-[3rem] shadow-2xl overflow-hidden mt-4 mb-8 flex flex-col border border-slate-100">
            <!-- Header -->
            <div class="bg-indigo-600 p-6 pt-10 text-white text-center">
                <h1 class="text-xl font-bold tracking-tight">一分钟演讲训练</h1>
                <p class="text-indigo-100 text-xs opacity-90 mt-1 uppercase tracking-widest">1-Min Speech Trainer</p>
            </div>

            <div class="p-8 space-y-6">
                <!-- Timer & Visualizer -->
                <div class="relative flex flex-col items-center justify-center py-4">
                    <svg class="w-48 h-48">
                        <circle class="text-slate-100" stroke-width="8" stroke="currentColor" fill="transparent" r="85" cx="96" cy="96" />
                        <circle id="timerRing" class="text-indigo-500 timer-circle" stroke-width="8" stroke-dasharray="534" stroke-dashoffset="0" stroke-linecap="round" stroke="currentColor" fill="transparent" r="85" cx="96" cy="96" />
                    </svg>
                    <div class="absolute inset-0 flex flex-col items-center justify-center">
                        <div id="timerDisplay" class="text-5xl font-mono font-medium text-slate-800">01:00</div>
                        <p id="statusLabel" class="text-slate-400 text-xs mt-2 font-medium">准备开始 (Ready)</p>
                    </div>
                </div>

                <!-- Speech Controls -->
                <div class="flex justify-center items-center h-24">
                    <button id="recordBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white w-20 h-20 rounded-full shadow-lg flex items-center justify-center transition-all active:scale-90 group">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
                        </svg>
                    </button>
                    <button id="stopBtn" class="bg-red-500 hover:bg-red-600 text-white w-20 h-20 rounded-full shadow-lg flex items-center justify-center transition-all active:scale-90 hidden">
                        <div class="w-6 h-6 bg-white rounded-sm"></div>
                    </button>
                </div>

                <!-- Playback & Transcribe Actions -->
                <div id="actionsContainer" class="space-y-4 hidden border-t border-slate-100 pt-6">
                    <div class="flex items-center space-x-3 bg-slate-50 p-4 rounded-2xl border border-slate-100">
                        <button id="playBtn" class="text-indigo-600 hover:text-indigo-800 transition-colors">
                            <svg id="playIcon" xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M8 5v14l11-7z" />
                            </svg>
                        </button>
                        <div class="flex-1 h-1.5 bg-slate-200 rounded-full overflow-hidden">
                            <div id="progressBar" class="h-full bg-indigo-500 w-0 transition-all duration-100"></div>
                        </div>
                    </div>

                    <button id="transcribeBtn" class="w-full bg-slate-800 hover:bg-black text-white font-bold py-4 px-6 rounded-2xl shadow-lg flex items-center justify-center space-x-3 transition-all active:translate-y-1">
                        <span>生成演讲稿 (Transcribe Speech)</span>
                        <div id="loadingSpinner" class="hidden animate-spin h-5 w-5 border-2 border-white border-t-transparent rounded-full"></div>
                    </button>
                </div>

                <!-- Result Area -->
                <div id="resultContainer" class="hidden space-y-2 pb-4">
                    <div class="flex justify-between items-center">
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">识别结果 (Transcription)</span>
                        <button id="copyBtn" class="text-indigo-600 text-xs font-semibold">点击复制</button>
                    </div>
                    <div id="transcriptionText" class="w-full p-5 bg-indigo-50/50 border border-indigo-100 rounded-2xl text-slate-800 text-lg leading-relaxed shadow-inner italic"></div>
                </div>
                
                <div id="errorArea" class="hidden text-[10px] text-red-500 bg-red-50 p-3 rounded-lg border border-red-100"></div>
            </div>
        </div>
    </div>

    <script>
        const apiKey = ""; 
        const modelId = "gemini-2.5-flash-preview-09-2025";
        const SPEECH_LIMIT = 60; 

        let mediaRecorder;
        let audioChunks = [];
        let audioBlob;
        let audioPlayer = new Audio();
        let timerCountdown;
        let timeLeft = SPEECH_LIMIT;
        let currentMimeType = '';

        const recordBtn = document.getElementById('recordBtn');
        const stopBtn = document.getElementById('stopBtn');
        const playBtn = document.getElementById('playBtn');
        const transcribeBtn = document.getElementById('transcribeBtn');
        const statusLabel = document.getElementById('statusLabel');
        const timerDisplay = document.getElementById('timerDisplay');
        const timerRing = document.getElementById('timerRing');
        const actionsContainer = document.getElementById('actionsContainer');
        const resultContainer = document.getElementById('resultContainer');
        const transcriptionText = document.getElementById('transcriptionText');
        const progressBar = document.getElementById('progressBar');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const errorArea = document.getElementById('errorArea');

        const totalCircumference = 534;

        function updateTimerUI(seconds) {
            const m = String(Math.floor(seconds / 60)).padStart(2, '0');
            const s = String(seconds % 60).padStart(2, '0');
            timerDisplay.textContent = `${m}:${s}`;
            const offset = totalCircumference - (seconds / SPEECH_LIMIT) * totalCircumference;
            timerRing.style.strokeDashoffset = offset;
        }

        async function startSpeech() {
            errorArea.classList.add('hidden');
            resultContainer.classList.add('hidden');
            actionsContainer.classList.add('hidden');
            audioChunks = [];
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                // Better MimeType support detection for iOS
                const types = ['audio/webm;codecs=opus', 'audio/webm', 'audio/mp4', 'audio/wav'];
                currentMimeType = types.find(t => MediaRecorder.isTypeSupported(t)) || '';

                mediaRecorder = new MediaRecorder(stream, { mimeType: currentMimeType });

                mediaRecorder.ondataavailable = e => {
                    if (e.data.size > 0) audioChunks.push(e.data);
                };

                mediaRecorder.onstop = () => {
                    // Create Blob only after recording truly stops
                    audioBlob = new Blob(audioChunks, { type: currentMimeType || 'audio/mp4' });
                    const audioURL = URL.createObjectURL(audioBlob);
                    audioPlayer.src = audioURL;
                    
                    // UI Reset
                    actionsContainer.classList.remove('hidden');
                    statusLabel.textContent = "演讲结束 (Done)";
                    recordBtn.classList.remove('hidden');
                    stopBtn.classList.add('hidden');
                    statusLabel.classList.remove('text-indigo-600');
                };

                mediaRecorder.start();
                
                recordBtn.classList.add('hidden');
                stopBtn.classList.remove('hidden');
                statusLabel.textContent = "正在录音... (Speaking)";
                statusLabel.classList.add('text-indigo-600');

                timeLeft = SPEECH_LIMIT;
                updateTimerUI(timeLeft);
                
                timerCountdown = setInterval(() => {
                    timeLeft--;
                    updateTimerUI(timeLeft);
                    if (timeLeft <= 0) stopSpeech();
                }, 1000);
                
            } catch (err) {
                errorArea.textContent = "無法起動麦克風。請確認権限。 Error: " + err.message;
                errorArea.classList.remove('hidden');
            }
        }

        function stopSpeech() {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
                mediaRecorder.stream.getTracks().forEach(t => t.stop());
                clearInterval(timerCountdown);
            }
        }

        async function transcribe() {
            if (!audioBlob || audioBlob.size === 0) {
                errorArea.textContent = "無効な録音データです。";
                errorArea.classList.remove('hidden');
                return;
            }

            loadingSpinner.classList.remove('hidden');
            transcribeBtn.disabled = true;
            errorArea.classList.add('hidden');

            const reader = new FileReader();
            reader.readAsDataURL(audioBlob);
            reader.onloadend = async () => {
                const base64 = reader.result.split(',')[1];
                
                // Normalize mimeType for Gemini API
                let apiMimeType = audioBlob.type.split(';')[0];
                if (apiMimeType === 'audio/x-m4a' || apiMimeType === 'audio/mp4') {
                    apiMimeType = 'audio/mp4';
                } else if (!apiMimeType.includes('audio/')) {
                    apiMimeType = 'audio/mp4'; // Fallback
                }

                const payload = {
                    contents: [{
                        parts: [
                            { text: "请将这段中文演讲准确转换为文字。如果是空音请提示。只需要返回文字内容。" },
                            { inlineData: { mimeType: apiMimeType, data: base64 } }
                        ]
                    }]
                };

                try {
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelId}:generateContent?key=${apiKey}`;
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        const errData = await response.json();
                        throw new Error(errData.error?.message || "API通信失敗");
                    }

                    const result = await response.json();
                    const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                    
                    if (text) {
                        transcriptionText.textContent = text;
                        resultContainer.classList.remove('hidden');
                    } else {
                        transcriptionText.textContent = "未検出到有効語音。";
                        resultContainer.classList.remove('hidden');
                    }
                } catch (e) {
                    errorArea.textContent = "文字変換失敗: " + e.message;
                    errorArea.classList.remove('hidden');
                } finally {
                    loadingSpinner.classList.add('hidden');
                    transcribeBtn.disabled = false;
                }
            };
        }

        recordBtn.onclick = startSpeech;
        stopBtn.onclick = stopSpeech;
        
        playBtn.onclick = () => {
            if (audioPlayer.paused) {
                audioPlayer.play().catch(e => {
                    errorArea.textContent = "再生エラー: " + e.message;
                    errorArea.classList.remove('hidden');
                });
                document.getElementById('playIcon').innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
            } else {
                audioPlayer.pause();
                document.getElementById('playIcon').innerHTML = '<path d="M8 5v14l11-7z" />';
            }
        };

        audioPlayer.ontimeupdate = () => {
            if (audioPlayer.duration) {
                progressBar.style.width = `${(audioPlayer.currentTime / audioPlayer.duration) * 100}%`;
            }
        };

        audioPlayer.onended = () => {
            document.getElementById('playIcon').innerHTML = '<path d="M8 5v14l11-7z" />';
            progressBar.style.width = '0%';
        };

        transcribeBtn.onclick = transcribe;

        document.getElementById('copyBtn').onclick = () => {
            const text = transcriptionText.textContent;
            navigator.clipboard.writeText(text).then(() => {
                alert("已複製文本");
            }).catch(() => {
                const el = document.createElement('textarea');
                el.value = text;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                alert("已複製文本");
            });
        };

        // iOS Audio context unlock
        window.addEventListener('touchstart', () => {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            if (ctx.state === 'suspended') ctx.resume();
            audioPlayer.play().then(() => {
                audioPlayer.pause();
                audioPlayer.currentTime = 0;
            }).catch(() => {});
        }, { once: true });
    </script>
</body>
</html>
