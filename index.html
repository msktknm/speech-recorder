<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SpeechRec">
  <meta name="theme-color" content="#0a0a0f">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="manifest" href="manifest.json">
  <title>1分スピーチ録音</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;800&display=swap');

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface2: #1a1a26;
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.15);
      --text: #f0f0f8;
      --muted: rgba(240,240,248,0.45);
      --accent: #6c63ff;
      --accent2: #a78bfa;
      --red: #ff4d6d;
      --green: #4ade80;
      --amber: #fbbf24;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', system-ui, sans-serif;
      overflow: hidden;
    }

    #app {
      height: 100%;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: env(safe-area-inset-top, 44px) 0 env(safe-area-inset-bottom, 20px);
    }

    /* Header */
    .header {
      padding: 16px 24px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .lang-switch {
      display: flex;
      gap: 6px;
    }
    .lang-btn {
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .lang-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    /* Main area */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 24px;
      gap: 28px;
    }

    /* Timer ring */
    .timer-wrap {
      position: relative;
      width: 200px;
      height: 200px;
    }
    .timer-svg {
      transform: rotate(-90deg);
    }
    .ring-bg {
      fill: none;
      stroke: var(--surface2);
      stroke-width: 6;
    }
    .ring-progress {
      fill: none;
      stroke: var(--accent);
      stroke-width: 6;
      stroke-linecap: round;
      stroke-dasharray: 534;
      stroke-dashoffset: 534;
      transition: stroke-dashoffset 1s linear, stroke 0.3s;
    }
    .timer-inner {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
    }
    .timer-label {
      font-family: 'DM Mono', monospace;
      font-size: 44px;
      font-weight: 500;
      letter-spacing: -2px;
      line-height: 1;
    }
    .timer-sub {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* Waveform */
    .waveform {
      width: 100%;
      max-width: 340px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .waveform.active { opacity: 1; }
    .wave-bar {
      width: 3px;
      border-radius: 2px;
      background: var(--accent2);
      animation: none;
      height: 4px;
      transition: height 0.1s;
    }
    @keyframes wavePulse {
      0%, 100% { height: 4px; }
      50% { height: var(--h, 24px); }
    }
    .waveform.active .wave-bar {
      animation: wavePulse var(--dur, 0.8s) ease-in-out infinite;
    }

    /* Record button */
    .rec-btn-wrap {
      position: relative;
    }
    .rec-btn-ring {
      position: absolute;
      inset: -12px;
      border-radius: 50%;
      border: 2px solid transparent;
      transition: all 0.3s;
    }
    .rec-btn-wrap.recording .rec-btn-ring {
      border-color: rgba(255,77,109,0.4);
      animation: ringPulse 1.5s ease-in-out infinite;
    }
    @keyframes ringPulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.5; }
    }
    .rec-btn {
      width: 84px;
      height: 84px;
      border-radius: 50%;
      border: none;
      background: var(--surface2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      position: relative;
      box-shadow: 0 0 0 1px var(--border), 0 8px 32px rgba(0,0,0,0.4);
    }
    .rec-btn:active { transform: scale(0.93); }
    .rec-btn.recording { background: var(--red); }
    .rec-icon {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--red);
      transition: all 0.2s;
    }
    .rec-btn.recording .rec-icon {
      background: white;
      border-radius: 6px;
      width: 22px;
      height: 22px;
    }

    /* Status text */
    .status-text {
      font-size: 13px;
      color: var(--muted);
      text-align: center;
      letter-spacing: 0.5px;
      min-height: 18px;
    }

    /* Transcript panel */
    .transcript-panel {
      flex: 1;
      margin: 0 16px 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      display: none;
      flex-direction: column;
      gap: 8px;
      max-height: calc(100dvh - 420px);
    }
    .transcript-panel.show { display: flex; }

    .transcript-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    .transcript-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
    }
    .copy-btn {
      padding: 4px 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--accent2);
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .copy-btn:active { opacity: 0.7; }

    .transcript-text {
      font-size: 16px;
      line-height: 1.7;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
    }
    .transcript-placeholder {
      font-size: 14px;
      color: var(--muted);
      text-align: center;
      padding: 16px 0;
    }

    .processing-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--accent2);
    }
    .processing-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent2);
      animation: dotPulse 1s ease-in-out infinite;
    }
    .processing-dot:nth-child(2) { animation-delay: 0.2s; }
    .processing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dotPulse {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.3); }
    }

    /* Warning banner */
    .warning {
      margin: 0 16px 8px;
      padding: 12px 16px;
      background: rgba(251,191,36,0.1);
      border: 1px solid rgba(251,191,36,0.3);
      border-radius: 12px;
      font-size: 12px;
      color: var(--amber);
      line-height: 1.5;
      display: none;
    }
    .warning.show { display: block; }

    /* Bottom controls */
    .bottom-controls {
      padding: 0 24px 4px;
      display: flex;
      gap: 10px;
    }
    .reset-btn {
      flex: 1;
      padding: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      color: var(--muted);
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .reset-btn:active { opacity: 0.6; }
    .reset-btn.hidden { display: none; }
  </style>
</head>
<body>
<div id="app">

  <div class="header">
    <div class="logo">SpeechRec</div>
    <div class="lang-switch">
      <button class="lang-btn active" onclick="setLang('zh-CN')">中文</button>
      <button class="lang-btn" onclick="setLang('en-US')">EN</button>
    </div>
  </div>

  <div class="main">
    <div class="timer-wrap">
      <svg class="timer-svg" width="200" height="200" viewBox="0 0 200 200">
        <circle class="ring-bg" cx="100" cy="100" r="85"/>
        <circle class="ring-progress" id="ring" cx="100" cy="100" r="85"/>
      </svg>
      <div class="timer-inner">
        <div class="timer-label" id="timer">1:00</div>
        <div class="timer-sub" id="timer-sub">準備完了</div>
      </div>
    </div>

    <div class="waveform" id="waveform">
    </div>

    <div class="rec-btn-wrap" id="recWrap">
      <div class="rec-btn-ring"></div>
      <button class="rec-btn" id="recBtn" onclick="toggleRecording()">
        <div class="rec-icon"></div>
      </button>
    </div>

    <div class="status-text" id="statusText">タップして録音開始</div>
  </div>

  <div class="warning" id="warning">
    ⚠️ Web Speech API はブラウザ内処理です。Safari/iOS でご利用ください。
  </div>

  <div class="transcript-panel" id="transcriptPanel">
    <div class="transcript-header">
      <span class="transcript-title">文字起こし</span>
      <button class="copy-btn" onclick="copyText()">コピー</button>
    </div>
    <div id="transcriptContent">
      <div class="transcript-placeholder">録音後に文字起こしが表示されます</div>
    </div>
  </div>

  <div class="bottom-controls">
    <button class="reset-btn hidden" id="resetBtn" onclick="resetAll()">リセット</button>
  </div>

</div>

<script>
const DURATION = 60;
let lang = 'zh-CN';
let recognition = null;
let isRecording = false;
let timer = null;
let timeLeft = DURATION;
let transcript = '';
let interimText = '';
let audioContext = null;
let analyser = null;
let micStream = null;
let animFrame = null;
const circumference = 2 * Math.PI * 85;

// Build waveform bars
const waveform = document.getElementById('waveform');
const bars = [];
for (let i = 0; i < 40; i++) {
  const b = document.createElement('div');
  b.className = 'wave-bar';
  const dur = (0.6 + Math.random() * 0.8).toFixed(2);
  const h = (8 + Math.random() * 36).toFixed(0);
  const delay = (Math.random() * 0.8).toFixed(2);
  b.style.cssText = `--dur:${dur}s; --h:${h}px; animation-delay:${delay}s`;
  waveform.appendChild(b);
  bars.push(b);
}

function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && l === 'zh-CN') || (i === 1 && l === 'en-US'));
  });
}

function updateTimer(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  document.getElementById('timer').textContent = `${m}:${sec.toString().padStart(2,'0')}`;
  const progress = (DURATION - s) / DURATION;
  const offset = circumference - (progress * circumference);
  const ring = document.getElementById('ring');
  ring.style.strokeDashoffset = circumference - (progress * circumference);
  if (s <= 10) {
    ring.style.stroke = '#ff4d6d';
  } else {
    ring.style.stroke = '#6c63ff';
  }
}

function setupSpeechRecognition() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    document.getElementById('warning').classList.add('show');
    document.getElementById('statusText').textContent = '⚠️ この端末は非対応です';
    return false;
  }
  recognition = new SpeechRecognition();
  recognition.lang = lang;
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.maxAlternatives = 1;

  recognition.onresult = (e) => {
    let interim = '';
    let final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) final += t + ' ';
      else interim += t;
    }
    if (final) transcript += final;
    interimText = interim;
    renderTranscript();
  };

  recognition.onerror = (e) => {
    if (e.error === 'no-speech') return;
    console.warn('Speech error:', e.error);
  };

  recognition.onend = () => {
    if (isRecording) {
      try { recognition.start(); } catch(e) {}
    }
  };
  return true;
}

function renderTranscript() {
  const content = document.getElementById('transcriptContent');
  const full = transcript + (interimText ? `<span style="color:rgba(240,240,248,0.45)">${interimText}</span>` : '');
  if (full.trim()) {
    content.innerHTML = `<div class="transcript-text">${full}</div>`;
  }
}

async function toggleRecording() {
  if (isRecording) {
    stopRecording();
  } else {
    await startRecording();
  }
}

async function startRecording() {
  // Request mic
  try {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch(e) {
    document.getElementById('statusText').textContent = 'マイクのアクセスを許可してください';
    return;
  }

  // Visualizer
  audioContext = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioContext.createAnalyser();
  analyser.fftSize = 256;
  const src = audioContext.createMediaStreamSource(micStream);
  src.connect(analyser);
  updateWave();

  if (!setupSpeechRecognition()) return;

  transcript = '';
  interimText = '';
  timeLeft = DURATION;
  isRecording = true;

  // UI
  document.getElementById('recBtn').classList.add('recording');
  document.getElementById('recWrap').classList.add('recording');
  document.getElementById('waveform').classList.add('active');
  document.getElementById('timer-sub').textContent = '録音中';
  document.getElementById('transcriptPanel').classList.add('show');
  document.getElementById('transcriptContent').innerHTML = `
    <div class="processing-indicator">
      <div class="processing-dot"></div>
      <div class="processing-dot"></div>
      <div class="processing-dot"></div>
      <span>リアルタイム認識中...</span>
    </div>`;
  document.getElementById('statusText').textContent = 'タップして停止';
  document.getElementById('resetBtn').classList.remove('hidden');
  updateTimer(timeLeft);

  try { recognition.start(); } catch(e) {}

  timer = setInterval(() => {
    timeLeft--;
    updateTimer(timeLeft);
    if (timeLeft <= 0) stopRecording(true);
  }, 1000);
}

function updateWave() {
  if (!analyser) return;
  const data = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(data);
  bars.forEach((b, i) => {
    const val = data[Math.floor(i * data.length / bars.length)] || 0;
    const h = Math.max(4, (val / 255) * 46);
    b.style.height = h + 'px';
  });
  animFrame = requestAnimationFrame(updateWave);
}

function stopRecording(auto = false) {
  isRecording = false;
  clearInterval(timer);
  cancelAnimationFrame(animFrame);

  try { recognition.stop(); } catch(e) {}
  if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
  if (audioContext) { audioContext.close(); audioContext = null; }
  analyser = null;

  document.getElementById('recBtn').classList.remove('recording');
  document.getElementById('recWrap').classList.remove('recording');
  document.getElementById('waveform').classList.remove('active');
  bars.forEach(b => b.style.height = '4px');

  if (auto) {
    document.getElementById('timer-sub').textContent = '完了!';
    document.getElementById('statusText').textContent = '録音が完了しました';
  } else {
    document.getElementById('timer-sub').textContent = '停止';
    document.getElementById('statusText').textContent = 'もう一度録音するにはタップ';
  }

  setTimeout(() => {
    if (!transcript.trim() && !interimText.trim()) {
      document.getElementById('transcriptContent').innerHTML =
        '<div class="transcript-placeholder">音声が認識されませんでした。もう一度お試しください。</div>';
    } else {
      transcript += interimText;
      interimText = '';
      renderTranscript();
    }
  }, 500);
}

function resetAll() {
  if (isRecording) stopRecording();
  transcript = '';
  interimText = '';
  timeLeft = DURATION;
  updateTimer(DURATION);
  document.getElementById('ring').style.strokeDashoffset = circumference;
  document.getElementById('ring').style.stroke = '#6c63ff';
  document.getElementById('timer-sub').textContent = '準備完了';
  document.getElementById('statusText').textContent = 'タップして録音開始';
  document.getElementById('transcriptPanel').classList.remove('show');
  document.getElementById('resetBtn').classList.add('hidden');
  document.getElementById('transcriptContent').innerHTML =
    '<div class="transcript-placeholder">録音後に文字起こしが表示されます</div>';
}

function copyText() {
  const text = transcript.trim();
  if (!text) return;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.querySelector('.copy-btn');
      btn.textContent = '✓ コピー完了';
      setTimeout(() => btn.textContent = 'コピー', 1500);
    });
  }
}

// Init
document.getElementById('ring').style.strokeDasharray = circumference;
document.getElementById('ring').style.strokeDashoffset = circumference;

if (!('SpeechRecognition' in window || 'webkitSpeechRecognition' in window)) {
  document.getElementById('warning').classList.add('show');
}
</script>
</body>
</html>
